<div class="register-page">
  <div class="register-container">
    <div class="register-card card">
      <div class="register-header">
        <span class="material-icons">store</span>
        <h1>Registro Comprador</h1>
        <p>Accede a productos frescos directamente de productores</p>
      </div>

      @if (error) {
        <div class="alert alert-error">
          <span class="material-icons">error</span> {{ error }}
        </div>
      }

      <form (ngSubmit)="onSubmit()" id="register-buyer-form">
        <h3 class="form-section-title">Datos Personales</h3>
        <div class="form-group">
          <label class="form-label">Nombre completo *</label>
          <input class="form-input" type="text" [(ngModel)]="name" name="name" placeholder="Tu nombre" required />
        </div>
        <div class="form-row-2">
          <div class="form-group">
            <label class="form-label">Correo electrónico *</label>
            <input class="form-input" type="email" [(ngModel)]="email" name="email" placeholder="tu@empresa.com" required />
          </div>
          <div class="form-group">
            <label class="form-label">Teléfono</label>
            <input class="form-input" type="tel" [(ngModel)]="phone" name="phone" placeholder="+51 987 654 321" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Contraseña *</label>
          <input class="form-input" type="password" [(ngModel)]="password" name="password" placeholder="••••••••" required />
        </div>

        <h3 class="form-section-title">Datos de Empresa</h3>
        <div class="form-group">
          <label class="form-label">Razón Social *</label>
          <input class="form-input" type="text" [(ngModel)]="company" name="company" placeholder="Mi Empresa S.A.C." required />
        </div>
        <div class="form-row-2">
          <div class="form-group">
            <label class="form-label">RUC</label>
            <input class="form-input" type="text" [(ngModel)]="ruc" name="ruc" placeholder="20123456789" />
          </div>
          <div class="form-group">
            <label class="form-label">Tipo de Comprador *</label>
            <select class="form-input" [(ngModel)]="buyerType" name="buyerType" required>
              <option value="">Seleccionar tipo</option>
              @for (type of buyerTypes; track type) {
                <option [value]="type">{{ type }}</option>
              }
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Dirección</label>
          <input class="form-input" type="text" [(ngModel)]="address" name="address" placeholder="Dirección de entrega" />
        </div>

        <button type="submit" class="btn btn-primary btn-lg submit-btn" [disabled]="loading" id="register-buyer-submit">
          @if (loading) {
            <span class="spinner"></span> Registrando...
          } @else {
            Crear Cuenta
          }
        </button>
      </form>

      <div class="register-footer">
        <p>¿Ya tienes una cuenta? <a routerLink="/login">Iniciar Sesión</a></p>
        <p>¿Eres productor? <a routerLink="/registro-agricultor">Regístrate aquí</a></p>
      </div>
    </div>
  </div>
</div>
